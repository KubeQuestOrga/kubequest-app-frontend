apiVersion: apps/v1
kind: Deployment
metadata:
  name: prod-project-kubequest-frontend-deployment
  namespace: prod-project-kubequest-frontend
  labels:
    app: prod-project-kubequest-frontend
spec:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: prod-project-kubequest-frontend
  template:
    metadata:
      labels:
        app: prod-project-kubequest-frontend
    spec:
      containers:
        - name: prod-project-kubequest-frontend
          image: corentin35/project-kubequest-frontend:${TAG_VERSION}
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: '1'
              memory: '1Gi'
            limits:
              cpu: '2'
              memory: '2Gi'
      imagePullSecrets:
        - name: regcred
